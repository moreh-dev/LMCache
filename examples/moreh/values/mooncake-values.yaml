# This is a YAML-formatted file.

# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

mooncake:
  image:
    repository: "192.168.212.30:1780/moreh/mooncake"
    tag: "v0.3.6.post1-moreh_0924"
  master:
    replicas: 1
    command:
      - /bin/bash
      - -lc
    args:
      - |
        mooncake_master -v=1 -port=50051 --enable_ha true --etcd_endpoints etcd-ts:2379
    port: 50051
    resources:
      limits:
        cpu: 8
        memory: 32Gi
      requests:
        cpu: 8
        memory: 32Gi
  meta:
    replicas: 1
    command:
      - /bin/bash
      - -lc
    args:
      - |
        mooncake_http_metadata_server --port 8080
    port: 8080
    resources:
      limits:
        cpu: 8
        memory: 32Gi
      requests:
        cpu: 8
        memory: 32Gi
