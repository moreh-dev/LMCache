global:
  security:
    allowInsecureImages: true
image:
  registry: quay.io
  repository: coreos/etcd
  tag: v3.6.5

replicaCount: 1
# Explicitly remove authentication
auth:
  rbac:
    create: false

readinessProbe:
  enabled: false

livenessProbe:
  enabled: false

# added by moreh
# https://github.com/bitnami/charts/blob/main/bitnami/etcd/values.yaml
persistence:
  enabled: false

resources:
  requests:
    cpu: 8
    memory: 32Gi
  limits:
    cpu: 8
    memory: 32Gi
