apiVersion: v1
kind: Service
metadata:
  name: {{ include "infinistore.fullname" . }}-service
  labels:
    {{- include "infinistore.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "infinistore.selectorLabels" . | nindent 4 }}
  ports:
    - name: general
      port: {{ .Values.infinistore.servicePort }}
      targetPort: {{ .Values.infinistore.servicePort }}
