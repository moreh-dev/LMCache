apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "infinistore.fullname" . }}-statefulset
  labels:
    {{- include "infinistore.labels" . | nindent 4 }}
spec:
  replicas: {{.Values.infinistore.replicas}}
  serviceName: {{ include "infinistore.fullname" . }}-service
  selector:
    matchLabels:
      {{- include "infinistore.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      name: {{ include "infinistore.fullname" . }}-pod
      labels:
        {{- include "infinistore.labels" . | nindent 8 }}
    spec:
      {{- if .Values.infinistore.nodeSelectorTerms }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              {{- toYaml .Values.infinistore.nodeSelectorTerms | nindent 14 }}
      {{- end }}
      {{- if .Values.infinistore.tolerations }}
      tolerations:
        {{- toYaml .Values.infinistore.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "infinistore.name" . }}-container
          command:
            {{- toYaml .Values.infinistore.command | nindent 12 }}
          args:
            {{- toYaml .Values.infinistore.args | nindent 12 }}
          {{- if .Values.infinistore.env }}
          env:
            {{- toYaml .Values.infinistore.env | nindent 12 }}
          {{- end }}
          {{- if .Values.infinistore.securityContext }}
          securityContext:
            {{- toYaml .Values.infinistore.securityContext | nindent 12 }}
          {{- end }}
          image: {{.Values.infinistore.image}}
          imagePullPolicy: {{.Values.imagePullPolicy}}
          resources:
            {{- toYaml .Values.infinistore.resources | nindent 12 }}
          workingDir: {{.Values.workingDir}}
          {{- if .Values.infinistore.readinessProbe.enabled }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.infinistore.managePort }}
          {{- end }}
