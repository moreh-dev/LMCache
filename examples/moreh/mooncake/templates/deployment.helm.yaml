apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mooncake.fullname" . }}-master-deployment
  labels:
    {{- include "mooncake.labels" (tuple . "master") | nindent 4 }}
spec:
  replicas: {{.Values.mooncake.master.replicas}}
  selector:
    matchLabels:
      {{- include "mooncake.selectorLabels" (tuple . "master") | nindent 6 }}
  template:
    metadata:
      name: {{ include "mooncake.fullname" . }}-master-pod
      labels:
        {{- include "mooncake.labels" (tuple . "master") | nindent 8 }}
    spec:
      {{- if .Values.mooncake.master.affinity }}
      affinity:
        {{- toYaml .Values.mooncake.master.affinity | nindent 8 }}
      {{- end }}
      {{- if .Values.mooncake.master.tolerations }}
      tolerations:
        {{- toYaml .Values.mooncake.master.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "mooncake.name" . }}-master-container
          command:
            {{- toYaml .Values.mooncake.master.command | nindent 12 }}
          args:
            {{- toYaml .Values.mooncake.master.args | nindent 12 }}
          {{- if .Values.mooncake.master.env }}
          env:
            {{- toYaml .Values.mooncake.master.env | nindent 12 }}
          {{- end }}
          {{- if .Values.mooncake.master.securityContext }}
          securityContext:
            {{- toYaml .Values.mooncake.master.securityContext | nindent 12 }}
          {{- end }}
          image: {{.Values.mooncake.image.repository}}:{{.Values.mooncake.image.tag}}
          imagePullPolicy: {{.Values.mooncake.image.pullPolicy}}
          resources:
            {{- toYaml .Values.mooncake.master.resources | nindent 12 }}
          workingDir: {{.Values.workingDir}}
          {{- if .Values.mooncake.master.readinessProbe.enabled }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.mooncake.master.port }}
          {{- end }}
---
