# This is a YAML-formatted file.

# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

mooncake:
  image: "192.168.212.30:1780/moreh/mooncake:v0.3.5-moreh_0805"
  master:
    replicas: 1
    command:
      - /bin/bash
      - -lc
    args: 
      - |
        mooncake_master -v=1 -port=50051
    port:
      port: 50051
      targetPort: 50051
    resources:
      limits:
        cpu: 16
        memory: 32Gi
      requests:
        cpu: 16
        memory: 32Gi
  meta:
    replicas: 1
    command:
      - /bin/bash
      - -lc
    args: 
      - |
        mooncake_http_metadata_server --port 8080
    port:
      port: 8080
      targetPort: 8080
    resources:
      limits:
        cpu: 16
        memory: 32Gi
      requests:
        cpu: 16
        memory: 32Gi
