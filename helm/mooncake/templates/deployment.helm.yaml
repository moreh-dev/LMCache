apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mooncake.fullname" . }}-master-deployment
  labels:
    {{- include "mooncake.labels" (tuple . "master") | nindent 4 }}
spec:
  replicas: {{.Values.mooncake.master.replicas}}
  selector:
    matchLabels:
      {{- include "mooncake.selectorLabels" (tuple . "master") | nindent 6 }}
  template:
    metadata:
      name: {{ include "mooncake.fullname" . }}-master-pod
      labels:
        {{- include "mooncake.labels" (tuple . "master") | nindent 8 }}
    spec:
      {{- if .Values.mooncake.master.nodeSelectorTerms }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
{{ .Values.mooncake.master.nodeSelectorTerms | toYaml | indent 14 }}
      {{- end }}
      {{- if .Values.mooncake.master.tolerations }}
      tolerations:
{{ .Values.mooncake.master.tolerations | toYaml | indent 8 }}
      {{- end }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ .Values.imagePullSecrets | toYaml | indent 8 }}
      {{- end }}
      containers:
        - name: {{ include "mooncake.name" . }}-master-container
          command:
          {{- toYaml .Values.mooncake.master.command | nindent 12 }}
          args:
          {{- toYaml .Values.mooncake.master.args | nindent 12 }}
          {{- if .Values.mooncake.master.env }}
          env:
{{ .Values.mooncake.master.env | toYaml | indent 12 }}
          {{- end }}
          image: {{.Values.mooncake.image}}
          imagePullPolicy: {{.Values.imagePullPolicy}}
          resources:
{{ .Values.mooncake.master.resources | toYaml | indent 12 }}
          workingDir: {{.Values.workingDir}}
          {{- if .Values.mooncake.master.readinessProbe.enabled }}
          readinessProbe:
            tcpSocket:
              port: {{ (default dict .Values.mooncake.master.port).port }}
          {{- end }}
---
